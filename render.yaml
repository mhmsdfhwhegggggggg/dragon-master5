services:
  # Main API Server + Worker (dragon-master5.onrender.com)
  - type: web
    name: dragon-master5
    env: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build && npm run build:worker
    startCommand: npm run start:free-tier
    envVars:
      - key: NODE_ENV
        value: production
      
      # Set in Render Dashboard - Required
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      
      # OAuth
      - key: OAUTH_SERVER_URL
        value: https://oauth.dragaan-pro.com
      - key: APP_ID
        value: falcon_telegram_pro
      
      # CORS - Allow web app
      - key: CORS_ORIGINS
        value: https://dragon-master5.onrender.com
      - key: ANTI_BAN_ENABLED
        value: true
      - key: ENABLE_LICENSE_CHECK
        value: "false"
      - key: ENABLE_REGISTRATION
        value: "true"
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /health
    autoDeploy: true
